name: Import Historical CSV (Staging)

on:
  workflow_dispatch:
    inputs:
      apply:
        description: 'Run actual import after dry-run (true/false)'
        required: false
        type: choice
        options:
          - 'false'
          - 'true'
        default: 'false'

jobs:
  import_historical:
    uses: ./.github/workflows/import-historical-common.yml
    with:
      target: staging
      environment_name: "Preview – mj-score-manager-tfvp"
      apply: ${{ inputs.apply == 'true' }}
      confirmation: ''
    secrets: inherit
