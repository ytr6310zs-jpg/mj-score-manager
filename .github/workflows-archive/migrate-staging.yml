name: Migrate Staging / Preview

on:
  workflow_dispatch:
    inputs:
      target:
        description: 'Target environment (preview | staging | prod)'
        required: false
        default: 'staging'
  push:
    branches: [ main ]
    paths:
      - 'ddl/**'
      - '.github/workflows/**'
      - 'supabase/**'

jobs:
  migrate:
    uses: ./.github/workflows/migrate-common.yml
    with:
      target: ${{ github.event.inputs.target || 'staging' }}
      environment_name: "Preview – mj-score-manager-tfvp"
      allow_repair: true
      supabase_cli_version: '2.84.2'
    secrets: inherit
