name: Supabase Keepalive Ping

on:
  schedule:
    # Run every 12 hours to keep free-tier projects active.
    - cron: '0 */12 * * *'
  workflow_dispatch:
    inputs:
      target:
        description: 'Manual run target (all | staging | prod)'
        required: false
        default: all
        type: choice
        options:
          - all
          - staging
          - prod

jobs:
  keepalive-staging:
    name: Keepalive (staging)
    if: ${{ github.event_name != 'workflow_dispatch' || github.event.inputs.target == 'all' || github.event.inputs.target == 'staging' }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    environment: "Preview – mj-score-manager-tfvp"

    steps:
      - name: Resolve target URL and ping
        env:
          SECRET_APP_URL: ${{ secrets.APP_URL }}
          STAGING_APP_URL: ${{ secrets.STAGING_APP_URL }}
          PREVIEW_APP_URL: ${{ secrets.PREVIEW_APP_URL }}
          KEEPALIVE_PING_PATH: ${{ vars.KEEPALIVE_PING_PATH }}
        run: |
          set -euo pipefail

          BASE_URL="${SECRET_APP_URL:-${STAGING_APP_URL:-${PREVIEW_APP_URL:-}}}"

          if [ -z "$BASE_URL" ]; then
            echo "APP_URL is not configured for staging." >&2
            exit 1
          fi

          PING_PATH="${KEEPALIVE_PING_PATH:-/api/yakumans}"
          PING_URL="${BASE_URL%/}${PING_PATH}"

          STATUS_CODE=$(curl -sS -o /tmp/keepalive-body.txt -w "%{http_code}" --max-time 20 --retry 2 --retry-delay 2 "$PING_URL")

          if [ "$STATUS_CODE" -ge 200 ] && [ "$STATUS_CODE" -lt 400 ]; then
            echo "Keepalive ping succeeded for staging (HTTP $STATUS_CODE)."
            exit 0
          fi

          echo "Keepalive ping failed for staging (HTTP $STATUS_CODE)." >&2
          head -c 500 /tmp/keepalive-body.txt >&2 || true
          exit 1

  keepalive-prod:
    name: Keepalive (prod)
    if: ${{ github.event_name != 'workflow_dispatch' || github.event.inputs.target == 'all' || github.event.inputs.target == 'prod' }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    environment: "Production – mj-score-manager-tfvp"

    steps:
      - name: Resolve target URL and ping
        env:
          SECRET_APP_URL: ${{ secrets.APP_URL }}
          PROD_APP_URL: ${{ secrets.PROD_APP_URL }}
          KEEPALIVE_PING_PATH: ${{ vars.KEEPALIVE_PING_PATH }}
        run: |
          set -euo pipefail

          BASE_URL="${SECRET_APP_URL:-${PROD_APP_URL:-}}"

          if [ -z "$BASE_URL" ]; then
            echo "APP_URL is not configured for prod." >&2
            exit 1
          fi

          PING_PATH="${KEEPALIVE_PING_PATH:-/api/yakumans}"
          PING_URL="${BASE_URL%/}${PING_PATH}"

          STATUS_CODE=$(curl -sS -o /tmp/keepalive-body.txt -w "%{http_code}" --max-time 20 --retry 2 --retry-delay 2 "$PING_URL")

          if [ "$STATUS_CODE" -ge 200 ] && [ "$STATUS_CODE" -lt 400 ]; then
            echo "Keepalive ping succeeded for prod (HTTP $STATUS_CODE)."
            exit 0
          fi

          echo "Keepalive ping failed for prod (HTTP $STATUS_CODE)." >&2
          head -c 500 /tmp/keepalive-body.txt >&2 || true
          exit 1
