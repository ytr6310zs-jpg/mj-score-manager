name: Supabase Keepalive Ping

on:
  schedule:
    # Run every 12 hours to keep free-tier projects active.
    - cron: '0 */12 * * *'
  workflow_dispatch:
    inputs:
      target:
        description: 'Manual run target (all | staging | prod)'
        required: false
        default: all
        type: choice
        options:
          - all
          - staging
          - prod

jobs:
  keepalive-staging:
    name: Keepalive (staging)
    if: ${{ github.event_name != 'workflow_dispatch' || github.event.inputs.target == 'all' || github.event.inputs.target == 'staging' }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    environment: "Preview – mj-score-manager-tfvp"

    steps:
      - name: Ping Supabase REST API (staging)
        env:
          SUPABASE_URL: ${{ secrets.STAGING_SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.STAGING_SUPABASE_ANON_KEY }}
        run: |
          set -euo pipefail

          if [ -z "${SUPABASE_URL:-}" ] || [ -z "${SUPABASE_ANON_KEY:-}" ]; then
            echo "STAGING_SUPABASE_URL or STAGING_SUPABASE_ANON_KEY is not configured." >&2
            exit 1
          fi

          PING_URL="${SUPABASE_URL%/}/rest/v1/players?select=count&limit=1"

          STATUS_CODE=$(curl -sS \
            -H "apikey: ${SUPABASE_ANON_KEY}" \
            -H "Authorization: Bearer ${SUPABASE_ANON_KEY}" \
            -o /tmp/keepalive-body.txt \
            -w "%{http_code}" \
            --max-time 20 --retry 2 --retry-delay 2 \
            "$PING_URL")

          if [ "$STATUS_CODE" -ge 200 ] && [ "$STATUS_CODE" -lt 400 ]; then
            echo "Keepalive ping succeeded for staging (HTTP $STATUS_CODE)."
            exit 0
          fi

          echo "Keepalive ping failed for staging (HTTP $STATUS_CODE)." >&2
          head -c 500 /tmp/keepalive-body.txt >&2 || true
          exit 1

  keepalive-prod:
    name: Keepalive (prod)
    if: ${{ github.event_name != 'workflow_dispatch' || github.event.inputs.target == 'all' || github.event.inputs.target == 'prod' }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    environment: "Production – mj-score-manager-tfvp"

    steps:
      - name: Ping Supabase REST API (prod)
        env:
          SUPABASE_URL: ${{ secrets.PROD_SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.PROD_SUPABASE_ANON_KEY }}
        run: |
          set -euo pipefail

          if [ -z "${SUPABASE_URL:-}" ] || [ -z "${SUPABASE_ANON_KEY:-}" ]; then
            echo "PROD_SUPABASE_URL or PROD_SUPABASE_ANON_KEY is not configured." >&2
            exit 1
          fi

          PING_URL="${SUPABASE_URL%/}/rest/v1/players?select=count&limit=1"

          STATUS_CODE=$(curl -sS \
            -H "apikey: ${SUPABASE_ANON_KEY}" \
            -H "Authorization: Bearer ${SUPABASE_ANON_KEY}" \
            -o /tmp/keepalive-body.txt \
            -w "%{http_code}" \
            --max-time 20 --retry 2 --retry-delay 2 \
            "$PING_URL")

          if [ "$STATUS_CODE" -ge 200 ] && [ "$STATUS_CODE" -lt 400 ]; then
            echo "Keepalive ping succeeded for prod (HTTP $STATUS_CODE)."
            exit 0
          fi

          echo "Keepalive ping failed for prod (HTTP $STATUS_CODE)." >&2
          head -c 500 /tmp/keepalive-body.txt >&2 || true
          exit 1
