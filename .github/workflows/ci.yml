name: CI

on:
  push:
    branches: [ main, develop, '**/feature/**' ]
  pull_request:
    branches: [ main, develop ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install
        run: npm ci
      - name: Run tests with coverage
        run: npm run test:coverage
      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage
      - name: Build
        run: npm run build
      - name: Lint
        run: npm run lint

  migrate-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install
        run: npm ci
      - name: Install Playwright browsers
        run: npx playwright@latest install --with-deps
      - name: Start local Supabase
        run: npx supabase@2.84.2 start
      - name: Run migrations
        run: npx supabase@2.84.2 db push --db-url "postgresql://postgres:postgres@127.0.0.1:54322/postgres"
      - name: Run Node.js tests
        env:
          DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:54322/postgres
        run: npm test
      - name: Build Next.js
        run: npm run build
      - name: Run Playwright browser E2E tests
        env:
          DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:54322/postgres
          SUPABASE_URL: http://localhost:54321
          SUPABASE_ANON_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxvY2FsaG9zdCIsInJvbGUiOiJhbm9uIiwiaWF0IjoxNjAwMDAwMDAwLCJleHAiOjE5MDAwMDAwMDB9.AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA
        run: npm run test:ui
        timeout-minutes: 10
      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
