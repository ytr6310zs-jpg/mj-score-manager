name: CI

on:
  push:
    branches: [ main, develop, '**/feature/**' ]
  pull_request:
    branches: [ main, develop ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install
        run: npm ci
      - name: Run tests
        run: npm test
      - name: Build
        run: npm run build
      - name: Lint
        run: npm run lint

  migrate-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        ports:
          - 5432:5432
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: testdb
        # For non-container jobs, expose service port and connect from the runner via localhost.
        options: >-
          --health-cmd="pg_isready -h localhost -p 5432 -U test -d testdb"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgres://test:test@localhost:5432/testdb

    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install
        run: npm ci
      - name: Install psql client
        run: sudo apt-get update && sudo apt-get install -y postgresql-client
      - name: Wait for Postgres
        env:
          PGPASSWORD: test
        run: |
          echo "Waiting for Postgres to accept connections..."
          # Wait up to 180 seconds for Postgres to accept connections
          for i in $(seq 1 180); do
            if psql -h localhost -U test -d testdb -c '\q' > /dev/null 2>&1 || \
               pg_isready -h localhost -p 5432 -U test -d testdb > /dev/null 2>&1; then
              echo "Postgres is ready"
              exit 0
            fi
            echo "waiting for postgres... ($i)"
            sleep 1
          done
          echo "Postgres did not become ready in time" >&2
          echo "---- Docker ps ----"
          docker ps --no-trunc --format 'ID={{.ID}} Image={{.Image}} Names={{.Names}} Status={{.Status}}'
          echo "---- Docker logs for postgres-like containers ----"
          # show logs for containers using postgres image
          for cid in $(docker ps --filter ancestor=postgres:15 --format '{{.ID}}'); do
            echo "---- logs for $cid ----";
            docker logs --tail 200 "$cid" || true;
          done
          exit 1
      - name: Run migrations
        env:
          DATABASE_URL: ${{ env.DATABASE_URL }}
        run: npm run migrate:up
      - name: Run tests
        env:
          DATABASE_URL: ${{ env.DATABASE_URL }}
        run: npm test
