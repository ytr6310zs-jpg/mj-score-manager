name: CI

on:
  push:
    branches: [ main, develop, '**/feature/**' ]
  pull_request:
    branches: [ main, develop ]

jobs:
  # ─────────────────────────────────────────────
  # Job 1: unit — Supabase 不要な高速フィードバック
  # ─────────────────────────────────────────────
  unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install
        run: npm ci
      - name: Run tests with coverage
        run: npm run test:coverage
      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage
      - name: Build
        run: npm run build
      - name: Lint
        run: npm run lint

  # ─────────────────────────────────────────────
  # Job 2: migrate — DB 依存 Node.js テスト
  # ─────────────────────────────────────────────
  migrate:
    runs-on: ubuntu-latest
    needs: [unit]
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install
        run: npm ci
      - name: Start local Supabase
        run: npx supabase@2.84.2 start
      - name: Run migrations
        run: npx supabase@2.84.2 db push --db-url "postgresql://postgres:postgres@127.0.0.1:54322/postgres"
      - name: Run integration tests
        env:
          DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:54322/postgres
          SUPABASE_URL: http://127.0.0.1:54321
          SUPABASE_ANON_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZS1kZW1vIiwicm9sZSI6ImFub24iLCJleHAiOjE5ODM4MTI5OTZ9.CRXP1A7WOeoJeXxjNni43kdQwgnWNReilDMblYTn_I0
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          ACCESS_PASSWORD: ${{ secrets.ACCESS_PASSWORD }}
        run: npm run test:integration
      - name: Run Node.js E2E tests
        env:
          DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:54322/postgres
          SUPABASE_URL: http://127.0.0.1:54321
          SUPABASE_ANON_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZS1kZW1vIiwicm9sZSI6ImFub24iLCJleHAiOjE5ODM4MTI5OTZ9.CRXP1A7WOeoJeXxjNni43kdQwgnWNReilDMblYTn_I0
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          ACCESS_PASSWORD: ${{ secrets.ACCESS_PASSWORD }}
        run: npm run test:e2e

  # ─────────────────────────────────────────────
  # Job 3: e2e — Playwright ブラウザ E2E
  # ─────────────────────────────────────────────
  e2e:
    runs-on: ubuntu-latest
    needs: [migrate]
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install
        run: npm ci
      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright@latest install --with-deps
      - name: Install Playwright system dependencies (cache hit)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright@latest install-deps
      - name: Start local Supabase
        run: npx supabase@2.84.2 start
      - name: Run migrations
        run: npx supabase@2.84.2 db push --db-url "postgresql://postgres:postgres@127.0.0.1:54322/postgres"
      - name: Build Next.js
        run: npm run build
      - name: Run Playwright browser E2E tests
        env:
          DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:54322/postgres
          SUPABASE_URL: http://127.0.0.1:54321
          SUPABASE_ANON_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZS1kZW1vIiwicm9sZSI6ImFub24iLCJleHAiOjE5ODM4MTI5OTZ9.CRXP1A7WOeoJeXxjNni43kdQwgnWNReilDMblYTn_I0
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          ACCESS_PASSWORD: ${{ secrets.ACCESS_PASSWORD }}
        run: npm run test:ui
        timeout-minutes: 10
      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
