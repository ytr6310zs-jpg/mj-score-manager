name: Check required repository files

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  check-files:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Ensure .github/copilot-instructions.md exists
        run: |
          if [ ! -f .github/copilot-instructions.md ]; then
            echo ".github/copilot-instructions.md が見つかりません。";
            echo "このファイルは必須です。修正または追加してください。";
            exit 1;
          fi
