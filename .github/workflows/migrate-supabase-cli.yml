name: Migrate via Supabase CLI

on:
  workflow_dispatch:
    inputs:
      target:
        description: 'Target environment (preview | staging | prod)'
        required: false
        default: 'staging'
      use_self_hosted:
        description: 'Run on self-hosted runner with label mj-db-runner'
        required: false
        default: 'false'
      use_ssh_tunnel:
        description: 'Set to "true" to create an SSH tunnel via a bastion host'
        required: false
        default: 'false'

jobs:
  migrate-hosted:
    if: ${{ github.event.inputs.use_self_hosted != 'true' }}
    runs-on: ubuntu-latest
    env:
      PREVIEW_DATABASE_URL: ${{ secrets.PREVIEW_DATABASE_URL }}
      STAGING_DATABASE_URL: ${{ secrets.STAGING_DATABASE_URL }}
      PROD_DATABASE_URL: ${{ secrets.PROD_DATABASE_URL }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node (for supabase CLI via npm)
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install supabase CLI
        run: npm install -g supabase@latest

      - name: Resolve DATABASE_URL from target
        id: resolve
        run: |
          set -euo pipefail
          TARGET=${{ github.event.inputs.target || 'staging' }}
          echo "Selected target: $TARGET"
          if [ "$TARGET" = "preview" ]; then
            echo "DATABASE_URL=$PREVIEW_DATABASE_URL" >> $GITHUB_OUTPUT
            exit 0
          fi
          if [ "$TARGET" = "staging" ]; then
            echo "DATABASE_URL=$STAGING_DATABASE_URL" >> $GITHUB_OUTPUT
            exit 0
          fi
          echo "DATABASE_URL=$PROD_DATABASE_URL" >> $GITHUB_OUTPUT

      - name: Optional: write CA bundle (base64) to file
        if: ${{ secrets.DB_CA_BUNDLE_BASE64 != '' }}
        run: |
          set -euo pipefail
          echo "$DB_CA_BUNDLE_BASE64" | base64 -d > /tmp/db-ca.pem
          echo "Wrote CA bundle to /tmp/db-ca.pem"
        env:
          DB_CA_BUNDLE_BASE64: ${{ secrets.DB_CA_BUNDLE_BASE64 }}

      - name: Run migrations via supabase CLI
        env:
          DATABASE_URL: ${{ steps.resolve.outputs.DATABASE_URL }}
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          set -euo pipefail
          echo "Using DATABASE_URL=${DATABASE_URL}"
          if [ -f /tmp/db-ca.pem ]; then
            export NODE_EXTRA_CA_CERTS=/tmp/db-ca.pem
            echo "NODE_EXTRA_CA_CERTS set to $NODE_EXTRA_CA_CERTS"
          fi
          # register remote and run migration/push. Adjust commands to your migration flow.
          supabase db remote set "$DATABASE_URL"
          supabase db push || true

  migrate-selfhosted:
    if: ${{ github.event.inputs.use_self_hosted == 'true' }}
    runs-on: [self-hosted, linux, mj-db-runner]
    env:
      PREVIEW_DATABASE_URL: ${{ secrets.PREVIEW_DATABASE_URL }}
      STAGING_DATABASE_URL: ${{ secrets.STAGING_DATABASE_URL }}
      PROD_DATABASE_URL: ${{ secrets.PROD_DATABASE_URL }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node (for supabase CLI via npm)
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install supabase CLI
        run: npm install -g supabase@latest

      - name: Resolve DATABASE_URL from target
        id: resolve
        run: |
          set -euo pipefail
          TARGET=${{ github.event.inputs.target || 'staging' }}
          echo "Selected target: $TARGET"
          if [ "$TARGET" = "preview" ]; then
            echo "DATABASE_URL=$PREVIEW_DATABASE_URL" >> $GITHUB_OUTPUT
            exit 0
          fi
          if [ "$TARGET" = "staging" ]; then
            echo "DATABASE_URL=$STAGING_DATABASE_URL" >> $GITHUB_OUTPUT
            exit 0
          fi
          echo "DATABASE_URL=$PROD_DATABASE_URL" >> $GITHUB_OUTPUT

      - name: Optional: write CA bundle (base64) to file
        if: ${{ secrets.DB_CA_BUNDLE_BASE64 != '' }}
        run: |
          set -euo pipefail
          echo "$DB_CA_BUNDLE_BASE64" | base64 -d > /tmp/db-ca.pem
          echo "Wrote CA bundle to /tmp/db-ca.pem"
        env:
          DB_CA_BUNDLE_BASE64: ${{ secrets.DB_CA_BUNDLE_BASE64 }}

      - name: Run migrations via supabase CLI
        env:
          DATABASE_URL: ${{ steps.resolve.outputs.DATABASE_URL }}
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          set -euo pipefail
          echo "Using DATABASE_URL=${DATABASE_URL}"
          supabase db remote set "$DATABASE_URL"
          supabase db push || true
