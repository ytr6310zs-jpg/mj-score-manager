            -o ExitOnForwardFailure=yes \
            -N -f \
            -L "${LOCAL_PORT}:${DB_HOST}:${DB_PORT}" \
            -p "${BASTION_PORT}" \
            "${SSH_BASTION_USER}@${SSH_BASTION_HOST}"

          for i in $(seq 1 15); do
            if (echo > /dev/tcp/127.0.0.1/"${LOCAL_PORT}") >/dev/null 2>&1; then
