name: Migrate Production

on:
  workflow_dispatch:
    inputs:
      use_self_hosted:
        description: 'Set to "true" to run on self-hosted runner with label mj-db-runner'
        required: false
        default: 'false'

jobs:
  migrate-prod:
    runs-on: ubuntu-latest
    environment: production
    env:
      PROD_DATABASE_URL: ${{ secrets.PROD_DATABASE_URL }}
      PROD_APP_URL: ${{ secrets.PROD_APP_URL }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: npm ci

      - name: Backup prod (artifact)
        if: always()
        run: |
          set -euo pipefail
          DBURL="$PROD_DATABASE_URL"
          echo "Using DATABASE_URL=$DBURL"
          apt-get update && apt-get install -y postgresql-client
          export PGPASSWORD=$(echo "$DBURL" | sed -E 's#.*://[^:]+:([^@]+)@.*#\1#')
          HOST=$(echo "$DBURL" | sed -E 's#.*://[^@]+@([^:/]+):([0-9]+)/([^?]+).*#\1#')
          PORT=$(echo "$DBURL" | sed -E 's#.*://[^@]+@([^:/]+):([0-9]+)/([^?]+).*#\2#')
          DB=$(echo "$DBURL" | sed -E 's#.*://[^@]+@([^:/]+):([0-9]+)/([^?]+).*#\3#')
          USER=$(echo "$DBURL" | sed -E 's#.*://([^:]+):.*#\1#')
          pg_dump -h "$HOST" -p "$PORT" -U "$USER" -Fc "$DB" -f prod-backup.dump || true

      - name: Upload backup artifact
        uses: actions/upload-artifact@v4
        with:
          name: prod-backup
          path: prod-backup.dump

      - name: Run migrations (hosted)
        if: ${{ github.event.inputs.use_self_hosted != 'true' }}
        env:
          DATABASE_URL: ${{ secrets.PROD_DATABASE_URL }}
        run: |
          npm run migrate:up

  migrate-prod-selfhosted:
    if: ${{ github.event.inputs.use_self_hosted == 'true' }}
    runs-on: [self-hosted, linux, mj-db-runner]
    environment: production
    env:
      PROD_DATABASE_URL: ${{ secrets.PROD_DATABASE_URL }}
      PROD_APP_URL: ${{ secrets.PROD_APP_URL }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: npm ci

      - name: Dump backup (artifact)
        if: always()
        continue-on-error: true
        env:
          DATABASE_URL: ${{ env.PROD_DATABASE_URL }}
        run: |
          set -euo pipefail
          DBURL="$DATABASE_URL"
          echo "Using DATABASE_URL (masked)..."
          apt-get update && apt-get install -y postgresql-client
          export PGPASSWORD=$(echo "$DBURL" | sed -E 's#.*://[^:]+:([^@]+)@.*#\1#')
          HOST=$(echo "$DBURL" | sed -E 's#.*://[^@]+@([^:/]+):([0-9]+)/([^?]+).*#\1#')
          PORT=$(echo "$DBURL" | sed -E 's#.*://[^@]+@([^:/]+):([0-9]+)/([^?]+).*#\2#')
          DB=$(echo "$DBURL" | sed -E 's#.*://[^@]+@([^:/]+):([0-9]+)/([^?]+).*#\3#')
          USER=$(echo "$DBURL" | sed -E 's#.*://([^:]+):.*#\1#')
          pg_dump -h "$HOST" -p "$PORT" -U "$USER" -Fc "$DB" -f prod-backup.dump || true

      - name: Upload backup artifact
        uses: actions/upload-artifact@v4
        with:
          name: prod-backup
          path: prod-backup.dump

      - name: Run migrations (self-hosted)
        env:
          DATABASE_URL: ${{ env.PROD_DATABASE_URL }}
        run: |
          npm run migrate:up
