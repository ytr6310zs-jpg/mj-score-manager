name: Migrate Production

on:
  workflow_dispatch:
    inputs: {}

jobs:
  migrate:
    uses: ./.github/workflows/migrate-common.yml
    with:
      allow_repair: false
      supabase_cli_version: '2.84.2'
      app_url: ${{ secrets.PROD_APP_URL }}
    secrets:
      DATABASE_URL: ${{ secrets.PROD_DATABASE_URL }}
      APP_URL: ${{ secrets.PROD_APP_URL }}
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      DB_CA_BUNDLE_BASE64: ${{ secrets.DB_CA_BUNDLE_BASE64 }}
    environment: "Production – mj-score-manager-tfvp"
