name: Migrate Staging / Preview

on:
  workflow_dispatch:
    inputs:
      target:
        description: 'Target environment (preview | staging | prod)'
        required: false
        default: 'staging'

jobs:
  migrate-staging:
    runs-on: ubuntu-latest
    environment: "Preview – mj-score-manager-tfvp"
    env:
      PREVIEW_DATABASE_URL: ${{ secrets.PREVIEW_DATABASE_URL }}
      STAGING_DATABASE_URL: ${{ secrets.STAGING_DATABASE_URL }}
      PROD_DATABASE_URL: ${{ secrets.PROD_DATABASE_URL }}
      PREVIEW_APP_URL: ${{ secrets.PREVIEW_APP_URL }}
      STAGING_APP_URL: ${{ secrets.STAGING_APP_URL }}
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      VERCEL_TEAM_ID: ${{ secrets.VERCEL_TEAM_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Check supabase CLI availability
        run: npx -y supabase@latest --version

      - name: Resolve DATABASE_URL from target
        id: resolve
        run: |
          set -euo pipefail
          TARGET=${{ github.event.inputs.target || 'staging' }}
          BRANCH_INPUT=${{ github.event.inputs.branch || '' }}
          echo "Selected target: $TARGET"
          if [ "$TARGET" = "preview" ]; then
            echo "Using preview database"
            # try to resolve preview app URL from Vercel if token provided
            if [ -n "$VERCEL_TOKEN" ] && [ -n "$VERCEL_PROJECT_ID" ]; then
              BRANCH=${BRANCH_INPUT:-${GITHUB_REF_NAME:-main}}
              echo "Resolving Vercel deployment for branch: $BRANCH"
              apt-get update && apt-get install -y jq curl
              DEPLOY_URL=$(curl -s -H "Authorization: Bearer $VERCEL_TOKEN" "https://api.vercel.com/v6/deployments?projectId=$VERCEL_PROJECT_ID&meta-gitBranch=$BRANCH" | jq -r '.deployments[0].url // empty') || true
              if [ -n "$DEPLOY_URL" ]; then
                # Treat Vercel preview as staging: use STAGING_DATABASE_URL
                echo "DATABASE_URL=$STAGING_DATABASE_URL" >> $GITHUB_OUTPUT
                echo "APP_URL=https://$DEPLOY_URL" >> $GITHUB_OUTPUT
                exit 0
              fi
            fi
            # fallback - map preview to staging
            echo "DATABASE_URL=$STAGING_DATABASE_URL" >> $GITHUB_OUTPUT
            echo "APP_URL=$STAGING_APP_URL" >> $GITHUB_OUTPUT
            exit 0
          fi
          if [ "$TARGET" = "staging" ]; then
            echo "DATABASE_URL=$STAGING_DATABASE_URL" >> $GITHUB_OUTPUT
            echo "APP_URL=$STAGING_APP_URL" >> $GITHUB_OUTPUT
            exit 0
          fi
          # default to prod
          echo "DATABASE_URL=$PROD_DATABASE_URL" >> $GITHUB_OUTPUT
          echo "APP_URL=$STAGING_APP_URL" >> $GITHUB_OUTPUT

      - name: Dump backup (artifact)
        if: always()
        continue-on-error: true
        env:
          DATABASE_URL: ${{ steps.resolve.outputs.DATABASE_URL }}
        run: |
          set -euo pipefail
          DBURL="$DATABASE_URL"
          sudo apt-get update && sudo apt-get install -y postgresql-client
          pg_dump --dbname="$DBURL" -Fc -f staging-backup.dump || true

      - name: "Optional: write CA bundle (base64) to file"
        run: |
          set -euo pipefail
          if [ -z "${DB_CA_BUNDLE_BASE64:-}" ]; then
            echo "DB_CA_BUNDLE_BASE64 is empty, skipping."
            exit 0
          fi
          echo "$DB_CA_BUNDLE_BASE64" | base64 -d > /tmp/db-ca.pem
        env:
          DB_CA_BUNDLE_BASE64: ${{ secrets.DB_CA_BUNDLE_BASE64 }}

      - name: Prepare DB URL for Supabase CLI
        env:
          DATABASE_URL: ${{ steps.resolve.outputs.DATABASE_URL }}
        run: |
          set -euo pipefail
          if [ -z "$DATABASE_URL" ]; then
            echo "DATABASE_URL is empty after resolution" >&2
            exit 1
          fi
          SUPABASE_DB_URL=$(node -e "const u=new URL(process.argv[1]); if(!u.searchParams.get('sslmode')) u.searchParams.set('sslmode','require'); u.username=decodeURIComponent(u.username||''); u.password=decodeURIComponent(u.password||''); console.log(u.toString());" "$DATABASE_URL")
          echo "SUPABASE_DB_URL=$SUPABASE_DB_URL" >> "$GITHUB_ENV"

      - name: Upload backup artifact
        uses: actions/upload-artifact@v4
        with:
          name: staging-backup
          path: staging-backup.dump

      - name: Run migrations against target via Supabase CLI
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "${SUPABASE_DB_URL:-}" ]; then
            echo "SUPABASE_DB_URL is empty after preparation" >&2
            exit 1
          fi
          if [ -f /tmp/db-ca.pem ]; then
            export NODE_EXTRA_CA_CERTS=/tmp/db-ca.pem
            export PGSSLROOTCERT=/tmp/db-ca.pem
          fi
          npx -y supabase@latest db push --db-url "$SUPABASE_DB_URL"

      - name: Post-migration healthcheck
        run: |
          APP_URL=${{ steps.resolve.outputs.APP_URL }}
          if [ -z "$APP_URL" ]; then echo "No APP_URL set, skipping healthcheck"; exit 0; fi
          for i in $(seq 1 10); do
            if curl -fsS "$APP_URL/health" >/dev/null 2>&1; then
              echo "Health OK"; exit 0
            fi
            sleep 5
          done
          echo "Healthcheck failed"; exit 2
