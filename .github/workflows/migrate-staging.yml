name: Migrate Staging / Preview

on:
  workflow_dispatch:
    inputs:
      target:
        description: 'Target environment (preview | staging | prod)'
        required: false
        default: 'staging'
  push:
    branches: [ main ]
    paths:
      - 'ddl/**'
      - '.github/workflows/**'
      - 'supabase/**'

jobs:
  migrate-staging:
    runs-on: ubuntu-latest
    environment: "Preview – mj-score-manager-tfvp"
    env:
      PREVIEW_DATABASE_URL: ${{ secrets.PREVIEW_DATABASE_URL }}
      STAGING_DATABASE_URL: ${{ secrets.STAGING_DATABASE_URL }}
      PROD_DATABASE_URL: ${{ secrets.PROD_DATABASE_URL }}
      PREVIEW_APP_URL: ${{ secrets.PREVIEW_APP_URL }}
      STAGING_APP_URL: ${{ secrets.STAGING_APP_URL }}
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      VERCEL_TEAM_ID: ${{ secrets.VERCEL_TEAM_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Check supabase CLI availability
        run: npx -y supabase@latest --version

      - name: Resolve DATABASE_URL from target
        id: resolve
        run: |
          set -euo pipefail
          TARGET=${{ github.event.inputs.target || 'staging' }}
          BRANCH_INPUT=${{ github.event.inputs.branch || '' }}
          echo "Selected target: $TARGET"
          if [ "$TARGET" = "preview" ]; then
            echo "Using preview database"
            # try to resolve preview app URL from Vercel if token provided
            if [ -n "$VERCEL_TOKEN" ] && [ -n "$VERCEL_PROJECT_ID" ]; then
              BRANCH=${BRANCH_INPUT:-${GITHUB_REF_NAME:-main}}
              echo "Resolving Vercel deployment for branch: $BRANCH"
              apt-get update && apt-get install -y jq curl
              DEPLOY_URL=$(curl -s -H "Authorization: Bearer $VERCEL_TOKEN" "https://api.vercel.com/v6/deployments?projectId=$VERCEL_PROJECT_ID&meta-gitBranch=$BRANCH" | jq -r '.deployments[0].url // empty') || true
              if [ -n "$DEPLOY_URL" ]; then
                # Treat Vercel preview as staging: use STAGING_DATABASE_URL
                echo "DATABASE_URL=$STAGING_DATABASE_URL" >> $GITHUB_OUTPUT
                echo "APP_URL=https://$DEPLOY_URL" >> $GITHUB_OUTPUT
                exit 0
              fi
            fi
            # fallback - map preview to staging
            echo "DATABASE_URL=$STAGING_DATABASE_URL" >> $GITHUB_OUTPUT
            echo "APP_URL=$STAGING_APP_URL" >> $GITHUB_OUTPUT
            exit 0
          fi
          if [ "$TARGET" = "staging" ]; then
            echo "DATABASE_URL=$STAGING_DATABASE_URL" >> $GITHUB_OUTPUT
            echo "APP_URL=$STAGING_APP_URL" >> $GITHUB_OUTPUT
            exit 0
          fi
          # default to prod
          echo "DATABASE_URL=$PROD_DATABASE_URL" >> $GITHUB_OUTPUT
          echo "APP_URL=$STAGING_APP_URL" >> $GITHUB_OUTPUT

      - name: Dump backup (artifact)
        if: always()
        continue-on-error: true
        env:
          DATABASE_URL: ${{ steps.resolve.outputs.DATABASE_URL }}
        run: |
          set -euo pipefail
          DBURL="$DATABASE_URL"
          sudo apt-get update && sudo apt-get install -y postgresql-client
          pg_dump --dbname="$DBURL" -Fc -f staging-backup.dump || true

      - name: "Optional: write CA bundle (base64) to file"
        run: |
          set -euo pipefail
          if [ -z "${DB_CA_BUNDLE_BASE64:-}" ]; then
            echo "DB_CA_BUNDLE_BASE64 is empty, skipping."
            exit 0
          fi
          echo "$DB_CA_BUNDLE_BASE64" | base64 -d > /tmp/db-ca.pem
        env:
          DB_CA_BUNDLE_BASE64: ${{ secrets.DB_CA_BUNDLE_BASE64 }}

      - name: Prepare DB URL for Supabase CLI
        env:
          DATABASE_URL: ${{ steps.resolve.outputs.DATABASE_URL }}
        run: |
          set -euo pipefail
          if [ -n "${DATABASE_URL:-}" ]; then
            echo "DATABASE_URL resolved from previous step"
          else
            if [ -n "${STAGING_DATABASE_URL:-}" ]; then
              export DATABASE_URL="${STAGING_DATABASE_URL}"
              echo "Falling back to STAGING_DATABASE_URL from secrets"
            elif [ -n "${PROD_DATABASE_URL:-}" ]; then
              export DATABASE_URL="${PROD_DATABASE_URL}"
              echo "Falling back to PROD_DATABASE_URL from secrets"
            fi
          fi
          if [ -z "${DATABASE_URL:-}" ]; then
            echo "DATABASE_URL is empty after resolution; ensure STAGING/PROD secrets are set" >&2
            exit 1
          fi
          SUPABASE_DB_URL=$(node -e "const u=new URL(process.argv[1]); if(!u.searchParams.get('sslmode')) u.searchParams.set('sslmode','require'); u.username=decodeURIComponent(u.username||''); u.password=decodeURIComponent(u.password||''); console.log(u.toString());" "$DATABASE_URL")
          echo "SUPABASE_DB_URL=$SUPABASE_DB_URL" >> "$GITHUB_ENV"

      - name: Upload backup artifact
        uses: actions/upload-artifact@v4
        with:
          name: staging-backup
          path: staging-backup.dump

      - name: Show remote migration history (diagnostic)
        if: always()
        continue-on-error: true
        run: |
          set -euo pipefail
          if [ -z "${SUPABASE_DB_URL:-}" ]; then
            echo "SUPABASE_DB_URL is empty, skipping remote migration history check"
            exit 0
          fi
          sudo apt-get update && sudo apt-get install -y postgresql-client
          echo "Listing recent rows from supabase_migrations.schema_migrations (if present)"
          psql "$SUPABASE_DB_URL" -c "SELECT version FROM supabase_migrations.schema_migrations ORDER BY version DESC LIMIT 50;" || true
          echo "Checking required tables existence"
          psql "$SUPABASE_DB_URL" -c "SELECT 'players' AS table, to_regclass('public.players') IS NOT NULL AS exists UNION ALL SELECT 'games', to_regclass('public.games') IS NOT NULL UNION ALL SELECT 'yakuman_occurrences', to_regclass('public.yakuman_occurrences') IS NOT NULL;" || true

      - name: "Temp: remove duplicate migration records (one-time cleanup)"
        continue-on-error: true
        run: |
          set -euo pipefail
          if [ -z "${SUPABASE_DB_URL:-}" ]; then
            echo "SUPABASE_DB_URL not set; skipping cleanup"
            exit 0
          fi
          sudo apt-get update -qq && sudo apt-get install -y postgresql-client
          psql "$SUPABASE_DB_URL" -c "DELETE FROM supabase_migrations.schema_migrations WHERE version IN ('20260403000000', '20260403000001');" || true
          echo "Cleanup complete"

      - name: Reconcile baseline migration history (safe repair)
        run: |
          set -euo pipefail
          if [ -z "${SUPABASE_DB_URL:-}" ]; then
            echo "SUPABASE_DB_URL is empty, skipping repair"
            exit 0
          fi

          apply_if_missing() {
            local version="$1"
            local table_name="$2"

            local has_version
            has_version=$(psql "$SUPABASE_DB_URL" -tAc "SELECT 1 FROM supabase_migrations.schema_migrations WHERE version='${version}' LIMIT 1;" || true)
            if [ "$has_version" = "1" ]; then
              echo "Migration version ${version} already recorded"
              return 0
            fi

            local has_table
            has_table=$(psql "$SUPABASE_DB_URL" -tAc "SELECT CASE WHEN to_regclass('public.${table_name}') IS NOT NULL THEN 1 ELSE 0 END;" || true)
            if [ "$has_table" != "1" ]; then
              echo "Table public.${table_name} does not exist yet; skip repair for ${version}"
              return 0
            fi

            echo "Repairing missing migration version ${version} as applied"
            npx -y supabase@latest migration repair --db-url "$SUPABASE_DB_URL" --status applied "$version"
          }

          apply_if_missing "20260401000000" "players"
          apply_if_missing "20260401000001" "games"

      - name: Enforce canonical migration source
        run: |
          set -euo pipefail
          mkdir -p /tmp/migcheck
          # tables defined in ddl/*.sql
          grep -hPoi "CREATE\s+TABLE(?:\s+IF\s+NOT\s+EXISTS)?\s+public\.\K[[:alnum:]_]+" ddl/*.sql 2>/dev/null | sort -u >/tmp/migcheck/ddl_tables.txt || true
          # tables defined in supabase/migrations/*.sql
          grep -hPoi "CREATE\s+TABLE(?:\s+IF\s+NOT\s+EXISTS)?\s+public\.\K[[:alnum:]_]+" supabase/migrations/*.sql 2>/dev/null | sort -u >/tmp/migcheck/sup_tables.txt || true
          # show tables that exist in ddl but not in supabase/migrations
          comm -23 /tmp/migcheck/ddl_tables.txt /tmp/migcheck/sup_tables.txt >/tmp/migcheck/only_in_ddl.txt || true
          if [ -s /tmp/migcheck/only_in_ddl.txt ]; then
            echo "Found table definitions present in ddl/ but missing in supabase/migrations/:" >&2
            cat /tmp/migcheck/only_in_ddl.txt >&2
            echo "Please migrate these definitions into supabase/migrations/ before running this workflow." >&2
            exit 1
          fi

      - name: Run migrations against target via Supabase CLI
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "${SUPABASE_DB_URL:-}" ]; then
            echo "SUPABASE_DB_URL is empty after preparation" >&2
            exit 1
          fi
          if [ -f /tmp/db-ca.pem ]; then
            export NODE_EXTRA_CA_CERTS=/tmp/db-ca.pem
            export PGSSLROOTCERT=/tmp/db-ca.pem
          fi
          npx -y supabase@latest db push --db-url "$SUPABASE_DB_URL"

      - name: Verify applied migrations (fail if expected tables missing)
        run: |
          set -euo pipefail
          sudo apt-get update && sudo apt-get install -y postgresql-client
          DBURL="${SUPABASE_DB_URL:-}"
          if [ -z "$DBURL" ]; then
            echo "SUPABASE_DB_URL is empty, cannot verify" >&2
            exit 1
          fi
          # collect table names from ddl/*.sql and supabase/migrations/*.sql (CREATE TABLE public.<name>)
          mkdir -p /tmp/migcheck
          grep -hPoi "CREATE\s+TABLE\s+public\.\K[[:alnum:]_]+" ddl/*.sql supabase/migrations/*.sql 2>/dev/null | sort -u >/tmp/migcheck/tables.txt || true
          if [ ! -s /tmp/migcheck/tables.txt ]; then
            echo "No tables found in ddl/*.sql or supabase/migrations/*.sql to verify; skipping verification.";
            exit 0
          fi
          while read -r tbl; do
            echo "Checking table: $tbl"
            if ! psql "$DBURL" -tAc "SELECT to_regclass('public.$tbl')" | grep -q "$tbl"; then
              echo "Table $tbl not found in target database" >&2
              exit 1
            fi
          done </tmp/migcheck/tables.txt
          echo "Migration verification succeeded: all expected tables present."

      - name: Post-migration healthcheck
        run: |
          APP_URL=${{ steps.resolve.outputs.APP_URL }}
          if [ -z "$APP_URL" ]; then echo "No APP_URL set, skipping healthcheck"; exit 0; fi
          for i in $(seq 1 10); do
            if curl -fsS "$APP_URL/health" >/dev/null 2>&1; then
              echo "Health OK"; exit 0
            fi
            sleep 5
          done
          echo "Healthcheck failed"; exit 2
