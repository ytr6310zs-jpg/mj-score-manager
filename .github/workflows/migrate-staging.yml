name: Migrate Staging / Preview

on:
  workflow_dispatch:
    inputs:
      target:
        description: 'Target environment (preview | staging | prod)'
        required: false
        default: 'staging'
      use_ssh_tunnel:
        description: 'Set to "true" to create an SSH tunnel via bastion'
        required: false
        default: 'false'

jobs:
  migrate-staging:
    runs-on: ubuntu-latest
    environment: "Preview – mj-score-manager-tfvp"
    env:
      PREVIEW_DATABASE_URL: ${{ secrets.PREVIEW_DATABASE_URL }}
      STAGING_DATABASE_URL: ${{ secrets.STAGING_DATABASE_URL }}
      PROD_DATABASE_URL: ${{ secrets.PROD_DATABASE_URL }}
      PREVIEW_APP_URL: ${{ secrets.PREVIEW_APP_URL }}
      STAGING_APP_URL: ${{ secrets.STAGING_APP_URL }}
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      VERCEL_TEAM_ID: ${{ secrets.VERCEL_TEAM_ID }}
      SSH_BASTION_HOST: ${{ secrets.SSH_BASTION_HOST }}
      SSH_BASTION_USER: ${{ secrets.SSH_BASTION_USER }}
      SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
      SSH_BASTION_PORT: ${{ secrets.SSH_BASTION_PORT }}
      SSH_TUNNEL_LOCAL_PORT: ${{ secrets.SSH_TUNNEL_LOCAL_PORT }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install supabase CLI
        run: npm install -g supabase@latest

      - name: Resolve DATABASE_URL from target
        id: resolve
        run: |
          set -euo pipefail
          TARGET=${{ github.event.inputs.target || 'staging' }}
          BRANCH_INPUT=${{ github.event.inputs.branch || '' }}
          echo "Selected target: $TARGET"
          if [ "$TARGET" = "preview" ]; then
            echo "Using preview database"
            # try to resolve preview app URL from Vercel if token provided
            if [ -n "$VERCEL_TOKEN" ] && [ -n "$VERCEL_PROJECT_ID" ]; then
              BRANCH=${BRANCH_INPUT:-${GITHUB_REF_NAME:-main}}
              echo "Resolving Vercel deployment for branch: $BRANCH"
              apt-get update && apt-get install -y jq curl
              DEPLOY_URL=$(curl -s -H "Authorization: Bearer $VERCEL_TOKEN" "https://api.vercel.com/v6/deployments?projectId=$VERCEL_PROJECT_ID&meta-gitBranch=$BRANCH" | jq -r '.deployments[0].url // empty') || true
              if [ -n "$DEPLOY_URL" ]; then
                echo "DATABASE_URL=$PREVIEW_DATABASE_URL" >> $GITHUB_OUTPUT
                echo "APP_URL=https://$DEPLOY_URL" >> $GITHUB_OUTPUT
                exit 0
              fi
            fi
            # fallback
            echo "DATABASE_URL=$PREVIEW_DATABASE_URL" >> $GITHUB_OUTPUT
            echo "APP_URL=$PREVIEW_APP_URL" >> $GITHUB_OUTPUT
            exit 0
          fi
          if [ "$TARGET" = "staging" ]; then
            echo "DATABASE_URL=$STAGING_DATABASE_URL" >> $GITHUB_OUTPUT
            echo "APP_URL=$STAGING_APP_URL" >> $GITHUB_OUTPUT
            exit 0
          fi
          # default to prod
          echo "DATABASE_URL=$PROD_DATABASE_URL" >> $GITHUB_OUTPUT
          echo "APP_URL=$STAGING_APP_URL" >> $GITHUB_OUTPUT

      - name: Dump backup (artifact)
        if: always()
        run: |
          set -euo pipefail
          DBURL=${{ steps.resolve.outputs.DATABASE_URL }}
          sudo apt-get update && sudo apt-get install -y postgresql-client
          export PGPASSWORD=$(echo "$DBURL" | sed -E 's#.*://[^:]+:([^@]+)@.*#\1#')
          HOST=$(echo "$DBURL" | sed -E 's#.*://[^@]+@([^:/]+):([0-9]+)/([^?]+).*#\1#')
          PORT=$(echo "$DBURL" | sed -E 's#.*://[^@]+@([^:/]+):([0-9]+)/([^?]+).*#\2#')
          DB=$(echo "$DBURL" | sed -E 's#.*://[^@]+@([^:/]+):([0-9]+)/([^?]+).*#\3#')
          USER=$(echo "$DBURL" | sed -E 's#.*://([^:]+):.*#\1#')
          pg_dump -h "$HOST" -p "$PORT" -U "$USER" -Fc "$DB" -f staging-backup.dump || true

      - name: "Optional: write CA bundle (base64) to file"
        run: |
          set -euo pipefail
          if [ -z "${DB_CA_BUNDLE_BASE64:-}" ]; then
            echo "DB_CA_BUNDLE_BASE64 is empty, skipping."
            exit 0
          fi
          echo "$DB_CA_BUNDLE_BASE64" | base64 -d > /tmp/db-ca.pem
        env:
          DB_CA_BUNDLE_BASE64: ${{ secrets.DB_CA_BUNDLE_BASE64 }}

      - name: "Optional: Start SSH tunnel for Postgres"
        if: ${{ github.event.inputs.use_ssh_tunnel == 'true' }}
        env:
          DBURL: ${{ steps.resolve.outputs.DATABASE_URL }}
        run: |
          set -euo pipefail

          if [ -z "${SSH_BASTION_HOST:-}" ] || [ -z "${SSH_BASTION_USER:-}" ] || [ -z "${SSH_PRIVATE_KEY:-}" ]; then
            echo "SSH tunnel requested but required secrets are missing (SSH_BASTION_HOST, SSH_BASTION_USER, SSH_PRIVATE_KEY)." >&2
            exit 1
          fi

          LOCAL_PORT="${SSH_TUNNEL_LOCAL_PORT:-15432}"
          BASTION_PORT="${SSH_BASTION_PORT:-22}"

          PARSED=$(node -e "const u=new URL(process.argv[1]); const db=u.pathname.replace(/^\\//,''); console.log('DB_HOST='+u.hostname); console.log('DB_PORT='+(u.port||'5432')); console.log('DB_USER='+decodeURIComponent(u.username)); console.log('DB_PASS='+decodeURIComponent(u.password)); console.log('DB_NAME='+db);" "$DBURL")
          echo "$PARSED" >> "$GITHUB_ENV"

          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/gha_bastion_key
          chmod 600 ~/.ssh/gha_bastion_key

          ssh -i ~/.ssh/gha_bastion_key \
            -o IdentitiesOnly=yes \
            -o StrictHostKeyChecking=accept-new \
            -o ExitOnForwardFailure=yes \
            -N -f \
            -L "${LOCAL_PORT}:${DB_HOST}:${DB_PORT}" \
            -p "${BASTION_PORT}" \
            "${SSH_BASTION_USER}@${SSH_BASTION_HOST}"

          for i in $(seq 1 15); do
            if (echo > /dev/tcp/127.0.0.1/"${LOCAL_PORT}") >/dev/null 2>&1; then
              break
            fi
            sleep 1
          done

          if ! (echo > /dev/tcp/127.0.0.1/"${LOCAL_PORT}") >/dev/null 2>&1; then
            echo "SSH tunnel did not become ready on 127.0.0.1:${LOCAL_PORT}" >&2
            exit 1
          fi

          FINAL_DB_URL=$(node -e "const enc=encodeURIComponent; const u=process.argv[1]; const lp=process.argv[2]; const host='127.0.0.1'; const url=new URL(u); const db=url.pathname.replace(/^\\//,''); const sp=url.searchParams; if(!sp.get('sslmode')) sp.set('sslmode','require'); console.log('postgres://'+enc(decodeURIComponent(url.username))+':'+enc(decodeURIComponent(url.password))+'@'+host+':'+lp+'/'+db+'?'+sp.toString());" "$DBURL" "$LOCAL_PORT")
          echo "FINAL_DATABASE_URL=${FINAL_DB_URL}" >> "$GITHUB_ENV"

      - name: Prepare final DATABASE_URL
        if: ${{ github.event.inputs.use_ssh_tunnel != 'true' }}
        run: |
          set -euo pipefail
          echo "FINAL_DATABASE_URL=${{ steps.resolve.outputs.DATABASE_URL }}" >> "$GITHUB_ENV"

      - name: Upload backup artifact
        uses: actions/upload-artifact@v4
        with:
          name: staging-backup
          path: staging-backup.dump

      - name: Run migrations against target via Supabase CLI
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          set -euo pipefail
          DATABASE_URL="${FINAL_DATABASE_URL:-}"
          if [ -z "$DATABASE_URL" ]; then
            echo "DATABASE_URL is empty after resolution" >&2
            exit 1
          fi
          if [ -f /tmp/db-ca.pem ]; then
            export NODE_EXTRA_CA_CERTS=/tmp/db-ca.pem
            export PGSSLROOTCERT=/tmp/db-ca.pem
          fi
          supabase db remote set "$DATABASE_URL"
          supabase db push

      - name: Post-migration healthcheck
        run: |
          APP_URL=${{ steps.resolve.outputs.APP_URL }}
          if [ -z "$APP_URL" ]; then echo "No APP_URL set, skipping healthcheck"; exit 0; fi
          for i in $(seq 1 10); do
            if curl -fsS "$APP_URL/health" >/dev/null 2>&1; then
              echo "Health OK"; exit 0
            fi
            sleep 5
          done
          echo "Healthcheck failed"; exit 2
